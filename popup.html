<!DOCTYPE html>
<html>

<body style="width: 300px; padding: 15px; font-family: sans-serif;">
    <h3>Gemini Settings</h3>
    <p>Enter your Google AI Studio API Key:</p>
    <input type="password" id="apiKey" placeholder="Paste API Key here"
        style="width: 100%; padding: 5px; margin-bottom: 10px;">
    <button id="saveBtn"
        style="width: 100%; padding: 8px; background: #0b57d0; color: white; border: none; cursor: pointer;">Save
        Key</button>
    <p id="status" style="color: green; margin-top: 10px;"></p>
    <script src="popup.js"></script>
</body>

</html>
